<!DOCTYPE html>
<html>

<head>
  
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>Poultry360 Dashboard V3</title>
  
  <style>
    body {
      font-family: Arial;
      background: #e8f5e9;
      text-align: center;
    }
    
    h1 {
      background: #1b5e20;
      color: white;
      padding: 15px;
    }
    
    .card {
      background: white;
      margin: 12px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 0 8px #aaa;
    }
    
    .value {
      font-size: 28px;
      font-weight: bold;
    }
    
    button {
      background: #2e7d32;
      color: white;
      border: 0;
      padding: 12px 25px;
      border-radius: 10px;
      font-size: 16px;
    }
    
    input,
    select {
      padding: 8px;
      margin: 5px;
      width: 100px;
    }
  </style>
  
</head>


<body>
  
  
  <h1>🐔 Poultry360 Smart Control</h1>
  
  
  <div class="card">
    
    🌡 Temperature
    
    <div class="value">
      <span id="temp">--</span> °C
    </div>
    
  </div>
  
  
  
  <div class="card">
    
    💧 Humidity
    
    <div class="value">
      <span id="hum">--</span> %
    </div>
    
  </div>
  
  
  
  <div class="card">
    
    System Status:
    
    <br>
    
    <span id="status">
      Connecting...
    </span>
    
  </div>
  
  
  
  <h2>Relay Control</h2>
  
  
  <div class="card">
    
    🔥 Heater
    
    <br>
    
    <span id="heater">OFF</span>
    
    <br><br>
    
    <button onclick="relay('Heater')">
      ON / OFF
    </button>
    
  </div>
  
  
  
  <div class="card">
    
    💨 Fan
    
    <br>
    
    <span id="fan">OFF</span>
    
    <br><br>
    
    <button onclick="relay('Fan')">
      ON / OFF
    </button>
    
  </div>
  
  
  
  <div class="card">
    
    🌫 Fogger
    
    <br>
    
    <span id="fogger">OFF</span>
    
    <br><br>
    
    <button onclick="relay('Fogger')">
      ON / OFF
    </button>
    
  </div>
  
  
  
  <div class="card">
    
    💡 Light
    
    <br>
    
    <span id="light">OFF</span>
    
    <br><br>
    
    <button onclick="relay('Light')">
      ON / OFF
    </button>
    
  </div>
  
  
  
  <div class="card">
    
    ⚙ Motor
    
    <br>
    
    <span id="motor">OFF</span>
    
    <br><br>
    
    <button onclick="relay('Motor')">
      ON / OFF
    </button>
    
  </div>
<h2>⚙ System Settings</h2>


<div class="card">

Temperature Limit

<br>

Min:

<input id="tmin" type="number">

<br>

Max:

<input id="tmax" type="number">


<br><br>


Humidity Limit

<br>

Min:

<input id="hmin" type="number">


<br>

Max:

<input id="hmax" type="number">


</div>



<div class="card">


Motor Interval

<br>

<input id="mintime" type="number">


<select id="minunit">

<option>Second</option>
<option>Minute</option>
<option>Hour</option>

</select>



<br><br>


Motor Run Time

<br>

<input id="runtime" type="number">


<select id="rununit">

<option>Second</option>
<option>Minute</option>

</select>


<br><br>


<button onclick="saveSetting()">

Save Settings

</button>


</div>




<script type="module">


import {initializeApp}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";


import {

getDatabase,
ref,
onValue,
set

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";




const firebaseConfig={


apiKey:"AIzaSyDGB8-3pF2GYbrJCONM_0R2H5xCCTJPAn4",

authDomain:"poultry360-489c3.firebaseapp.com",

databaseURL:"https://poultry360-489c3-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"poultry360-489c3",

storageBucket:"poultry360-489c3.firebasestorage.app",

messagingSenderId:"233201667115",

appId:"1:233201667115:web:1088923af65d6be8e5ae6e"

};



const app=initializeApp(firebaseConfig);


const db=getDatabase(app);




// Sensor Live


onValue(ref(db,"SmartPoultry/Sensor"),(snap)=>{


let d=snap.val();


if(d)

{

temp.innerHTML=d.Temperature;

hum.innerHTML=d.Humidity;

status.innerHTML="ONLINE";

}


});






// Relay Status


onValue(ref(db,"SmartPoultry/Relay"),(snap)=>{


let r=snap.val();


if(r)

{


heater.innerHTML=r.Heater?"ON":"OFF";

fan.innerHTML=r.Fan?"ON":"OFF";

fogger.innerHTML=r.Fogger?"ON":"OFF";

light.innerHTML=r.Light?"ON":"OFF";

motor.innerHTML=r.Motor?"ON":"OFF";


}


});






// Relay Control


window.relay=function(name)

{


let p=ref(db,"SmartPoultry/Relay/"+name);



onValue(p,(s)=>{


set(p,!s.val());


},{onlyOnce:true});



}







// Load Settings


onValue(ref(db,"SmartPoultry/Setting"),(snap)=>{


let s=snap.val();


if(s)

{


tmin.value=s.Temp_Min;

tmax.value=s.Temp_Max;


hmin.value=s.Hum_Min;

hmax.value=s.Hum_Max;


mintime.value=s.Motor_Interval_Value;

minunit.value=s.Motor_Interval_Unit;


runtime.value=s.Motor_Run_Value;

rununit.value=s.Motor_Run_Unit;


}


});







// Save Settings


window.saveSetting=function()

{


set(ref(db,"SmartPoultry/Setting"),{


Temp_Min:Number(tmin.value),

Temp_Max:Number(tmax.value),


Hum_Min:Number(hmin.value),

Hum_Max:Number(hmax.value),


Motor_Interval_Value:Number(mintime.value),

Motor_Interval_Unit:minunit.value,


Motor_Run_Value:Number(runtime.value),

Motor_Run_Unit:rununit.value



});



alert("Settings Saved");


}



</script>


</body>

</html>
